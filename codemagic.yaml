workflows:

  android-debug:
    name: Otto Ninja - Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.18.0
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Sync Capacitor assets to Android
        script: npx cap sync android

      - name: Set Gradle wrapper permissions
        script: chmod +x android/gradlew

      - name: Build Debug APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
